<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Talk — Nhiều agent trò chuyện</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>🤖 Agent Talk</h1>
    <p class="sub">Nhiều agent AI tự trò chuyện với nhau — bạn ngồi xem chúng nói gì.</p>
  </header>

  <main>
    <section class="setup" id="setup">
      <div class="section-head">
        <h2>Các agent</h2>
        <button id="addAgentBtn" class="mini">＋ Thêm agent</button>
      </div>
      <div class="agents" id="agents"></div>

      <label>Chủ đề (để trống để chúng tự chọn)</label>
      <input id="topic" value="Liệu AI có thể có cảm xúc thật sự không?" />

      <div class="controls">
        <label>Thứ tự nói
          <select id="orderMode">
            <option value="round">Luân phiên</option>
            <option value="auto">Tự chọn (AI quyết)</option>
          </select>
        </label>
        <label>Số lượt mỗi lần
          <input id="maxTurns" type="number" value="12" min="2" max="200" />
        </label>
        <label>Tốc độ (giây/lượt)
          <input id="delay" type="number" value="1" min="0" max="10" step="0.5" />
        </label>
        <label>Sáng tạo
          <input id="temp" type="number" value="0.9" min="0" max="2" step="0.1" />
        </label>
      </div>

      <div class="options">
        <label class="chk"><input type="checkbox" id="ttsOn" /> 🔊 Đọc to lời thoại</label>
        <label class="chk"><input type="checkbox" id="memOn" /> 🧠 Tự cập nhật bộ nhớ sau phiên</label>
      </div>

      <div class="buttons">
        <button id="startBtn">▶ Bắt đầu</button>
        <button id="continueBtn" disabled>⏩ Tiếp tục</button>
        <button id="stopBtn" disabled>⏹ Dừng</button>
        <button id="clearBtn">🗑 Xóa</button>
      </div>

      <div class="save-row">
        <span>Lưu hội thoại:</span>
        <button class="save" data-fmt="txt" disabled>.txt</button>
        <button class="save" data-fmt="md" disabled>.md</button>
        <button class="save" data-fmt="json" disabled>.json</button>
        <button id="copyBtn" class="mini" disabled>📋 Sao chép</button>
        <button id="shareBtn" class="mini" disabled>🔗 Chia sẻ link</button>
        <button id="scoreBtn" class="mini" disabled>🏆 Chấm điểm</button>
        <span class="sep">|</span>
        <span id="sessionInfo" class="session-info"></span>
        <button id="forgetBtn" class="mini">Xóa phiên đã lưu</button>
      </div>

      <div id="scoreResult" class="score-result" hidden></div>
    </section>

    <section class="chat" id="chat"></section>

    <div class="interject" id="interject">
      <input id="interjectInput" placeholder="💬 Xen vào (đạo diễn): gợi ý, đặt câu hỏi, đổi hướng..." />
      <button id="interjectBtn">Gửi</button>
    </div>
  </main>

  <template id="agentTpl">
    <div class="agent-card">
      <div class="card-head">
        <span class="dot"></span>
        <input class="a-name" placeholder="Tên" />
        <button class="remove mini" title="Xóa agent">✕</button>
      </div>
      <label>Bộ não (LLM)</label>
      <select class="a-provider"></select>
      <label>Tính cách mẫu</label>
      <select class="a-tpl"></select>
      <label>Tính cách</label>
      <textarea class="a-persona" rows="3"></textarea>
      <label>Mục tiêu ngầm (tùy chọn)</label>
      <input class="a-goal" placeholder="vd: thuyết phục người khác tin vào điều gì đó" />
      <details class="mem-box">
        <summary>🧠 Bộ nhớ dài hạn</summary>
        <textarea class="a-memory" rows="3" placeholder="Trống = chưa có ký ức. Sẽ tự điền sau mỗi phiên nếu bật bộ nhớ."></textarea>
        <button class="mem-clear mini" type="button">Xóa bộ nhớ</button>
      </details>
    </div>
  </template>

  <script src="/personas.js"></script>
  <script src="/app.js"></script>
</body>
</html>
